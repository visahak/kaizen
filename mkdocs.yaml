# Project information
site_name: Agent Lifecycle Toolkit (ALTK)
site_url: https://agenttoolkit.github.io/evolve
site_description: >-
  Evolve is a component in the Agent Lifecycle Toolkit (ALTK) that gives agent builders the ability to iteratively improve their agents by learning from previous trajectories.

# Repository
repo_name: AgentToolkit/altk-evolve
repo_url: https://github.com/AgentToolkit/altk-evolve

# Copyright
copyright: >
  Copyright &copy; 2025 Agent Lifecycle Toolkit (ALTK) project –
  <a href="#__consent">Change cookie settings</a>

# Configuration
theme:
  name: material
  custom_dir: docs/overrides
  features:
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - announce.dismiss
    - navigation.footer
    - navigation.tabs
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - toc.follow
  language: en
  palette:
    # Default dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to light mode

    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

    # System preference (dark)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-auto
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/logo-32x32.png
  logo: assets/logo-512x512.png
  icon:
    repo: fontawesome/brands/github

nav:
  - Home:
    - Overview: index.md
    - Installation: installation/index.md
  - Guides:
    - Configuration: guides/configuration.md
    - Phoenix Sync: guides/phoenix-sync.md
    - Extract Trajectories: guides/extract-trajectories.md
    - Low-Code Tracing: guides/low-code-tracing.md
  - Reference:
    - CLI: reference/cli.md
    - Policies: reference/policies.md
  - Integrations:
    - Evolve Lite: integrations/evolve-lite.md
  - Tutorials:
    - Hello World (IBM Bob IDE): examples/hello_world/bob.md
    - Claude Code Demo: tutorials/claude-code-demo.md
    - Starter Example 2 (Claude Code): examples/hello_world/claude.md
  - Operations:
    - Docker Testing: operations/docker-testing.md

extra_css:
  - stylesheets/extra.css

extra:
  # Project switcher nav bar — shown across all ALTK sites.
  # Set active: true on whichever project this repo represents.
  # Other repos should copy this list with their own entry marked active.
  projects:
    - name: ALTK
      url: https://agenttoolkit.github.io/altk-main/
    - name: Evolve
      url: https://agenttoolkit.github.io/altk-evolve/
      active: true
    # Add more projects here:
    # - name: Another Project
    #   url: https://agenttoolkit.github.io/another-project/
    #   icon: "🔧"   # optional emoji or text icon
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/AgentToolkit/altk-evolve
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg

plugins:
  - include-markdown
  - search
